# Doppler Setup for New Members
#
# This monorepo uses three Doppler projects. Each has its own doppler.yaml:
#
#   backend/         → selfserve-backend (dev)
#   clients/web/     → selfserve-web (dev)
#   clients/mobile/  → selfserve-mobile (dev)
#
# ─── Prerequisites ────────────────────────────────────────────────────────────
#
#   1. Install Doppler CLI
#        brew install dopplerhq/cli/doppler
#
#   2. Authenticate
#        doppler login
#
#   3. Run setup in each sub-directory (doppler.yaml already present):
#        cd backend         && doppler setup
#        cd clients/web     && doppler setup
#        cd clients/mobile  && doppler setup
#
# ─── Running with secrets ─────────────────────────────────────────────────────
#
#   backend:       doppler run -- go run ./cmd/api
#   web:           doppler run -- pnpm dev
#   mobile:        doppler run -- pnpm start
#
# ─── Useful commands ──────────────────────────────────────────────────────────
#
#   doppler secrets             list secrets for current directory
#   doppler secrets get KEY     get a specific secret value
#   doppler open                open the Doppler dashboard
#
# ─────────────────────────────────────────────────────────────────────────────

setup:
  project: selfserve-backend
  config: dev
