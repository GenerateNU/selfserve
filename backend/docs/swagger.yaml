host: localhost:8080
info:
  contact:
    email: support@selfserve.com
    name: API Support
  description: SelfServe backend API documentation
  license:
    name: MIT
    url: https://opensource.org/licenses/MIT
  termsOfService: http://swagger.io/terms/
  title: SelfServe API
  version: "1.0"
paths:
  /api/v1/guests:
    post:
      consumes:
        - application/json
      description: Retrieves guests optionally filtered by floor
      parameters:
        - description: Hotel ID (UUID)
          in: header
          name: X-Hotel-ID
          required: true
          type: string
        - description: Guest filters
          in: body
          name: body
          required: true
          schema:
            $ref: "#/definitions/GuestFilters"
      produces:
        - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: "#/definitions/GuestPage"
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties:
              type: string
            type: object
      security:
        - BearerAuth: []
      summary: Get Guests
      tags:
        - guests
  /api/v1/guests/{id}:
    get:
      consumes:
        - application/json
      description: Retrieves a single guest given an id
      parameters:
        - description: Guest ID (UUID)
          in: path
          name: id
          required: true
          type: string
      produces:
        - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: "#/definitions/Guest"
        "400":
          description: Invalid guest ID format
          schema:
            additionalProperties:
              type: string
            type: object
        "404":
          description: Guest not found
          schema:
            $ref: "#/definitions/github_com_generate_selfserve_internal_errs.HTTPError"
        "500":
          description: Internal server error
          schema:
            additionalProperties:
              type: string
            type: object
      security:
        - BearerAuth: []
      summary: Gets a guest
      tags:
        - guests
    put:
      consumes:
        - application/json
      description: Updates fields on a guest
      parameters:
        - description: Guest ID (UUID)
          in: path
          name: id
          required: true
          type: string
        - description: Guest update data
          in: body
          name: request
          required: true
          schema:
            $ref: "#/definitions/github_com_generate_selfserve_internal_models.UpdateGuest"
      produces:
        - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: "#/definitions/Guest"
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
        "404":
          description: Not Found
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties:
              type: string
            type: object
      security:
        - BearerAuth: []
      summary: Updates a guest
      tags:
        - guests
  /api/v1/guests/stays/{id}:
    get:
      consumes:
        - application/json
      description: Retrieves a single guest with previous stays given an id
      parameters:
        - description: Guest ID (UUID)
          in: path
          name: id
          required: true
          type: string
      produces:
        - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: "#/definitions/GuestWithStays"
        "400":
          description: Invalid guest ID format
          schema:
            additionalProperties:
              type: string
            type: object
        "404":
          description: Guest not found
          schema:
            $ref: "#/definitions/github_com_generate_selfserve_internal_errs.HTTPError"
        "500":
          description: Internal server error
          schema:
            additionalProperties:
              type: string
            type: object
      security:
        - BearerAuth: []
      summary: Gets a guest with previous stays
      tags:
        - guests
  /api/v1/hotels:
    post:
      consumes:
        - application/json
      description: Create a new hotel with the given data
      parameters:
        - description: Hotel data
          in: body
          name: hotel
          required: true
          schema:
            $ref: "#/definitions/Hotel"
      produces:
        - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: "#/definitions/Hotel"
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties:
              type: string
            type: object
      security:
        - BearerAuth: []
      summary: Create hotel
      tags:
        - hotels
  /api/v1/hotels/{id}:
    get:
      description: Retrieve a hotel's details using its UUID
      parameters:
        - description: Hotel ID (UUID)
          in: path
          name: id
          required: true
          type: string
      responses:
        "200":
          description: OK
          schema:
            $ref: "#/definitions/Hotel"
        "400":
          description: Invalid hotel ID format
          schema:
            $ref: "#/definitions/github_com_generate_selfserve_internal_errs.HTTPError"
        "404":
          description: Hotel not found
          schema:
            $ref: "#/definitions/github_com_generate_selfserve_internal_errs.HTTPError"
        "500":
          description: Internal server error
          schema:
            $ref: "#/definitions/github_com_generate_selfserve_internal_errs.HTTPError"
      security:
        - BearerAuth: []
      summary: Get hotel by ID
      tags:
        - hotels
  /devs/{name}:
    get:
      consumes:
        - application/json
      description: Retrieves a developer member by name
      parameters:
        - description: Developer name
          in: path
          name: name
          required: true
          type: string
      produces:
        - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: "#/definitions/Dev"
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties:
              type: string
            type: object
      security:
        - BearerAuth: []
      summary: Get developer member
      tags:
        - devs
  /guest_bookings/floor:
    get:
      description:
        Retrieves multiple guest bookings whose booked rooms are in the
        provided floors array
      parameters:
        - description: Comma-separated floor numbers
          in: query
          name: floors
          required: true
          type: string
      produces:
        - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: "#/definitions/GuestBooking"
            type: array
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Get guest Bookings By Floor
      tags:
        - guest-bookings
  /hello:
    get:
      consumes:
        - application/json
      description: Returns a simple hello message
      produces:
        - text/plain
      responses:
        "200":
          description: "Yogurt. Gurt: Yo!"
          schema:
            type: string
      security:
        - BearerAuth: []
      summary: Get hello message
      tags:
        - hello
  /hello/{name}:
    get:
      consumes:
        - application/json
      description: Returns a hello message with the provided name
      parameters:
        - description: Name to greet
          in: path
          name: name
          required: true
          type: string
      produces:
        - text/plain
      responses:
        "200":
          description: Yo, {name}!
          schema:
            type: string
      security:
        - BearerAuth: []
      summary: Get personalized hello message
      tags:
        - hello
  /request:
    post:
      consumes:
        - application/json
      description: Creates a request with the given data
      parameters:
        - description: Request data
          in: body
          name: request
          required: true
          schema:
            $ref: "#/definitions/MakeRequest"
      produces:
        - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: "#/definitions/Request"
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties:
              type: string
            type: object
      security:
        - BearerAuth: []
      summary: creates a request
      tags:
        - requests
  /request/cursor/{cursor}:
    get:
      consumes:
        - application/json
      description: Gets 20 requests starting after the cursor ID, filtered by status
      parameters:
        - description: Cursor UUID
          in: path
          name: cursor
          required: true
          type: string
        - description: "Status filter: pending, assigned, in progress, completed"
          in: query
          name: status
          required: true
          type: string
        - description: Hotel UUID
          in: query
          name: hotel_id
          required: true
          type: string
      produces:
        - application/json
      responses:
        "200":
          description: Returns requests array and next_cursor
          schema:
            additionalProperties: true
            type: object
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties:
              type: string
            type: object
      security:
        - BearerAuth: []
      summary: Get requests by cursor
      tags:
        - requests
  /request/generate:
    post:
      consumes:
        - application/json
      description: Generates a request using AI
      parameters:
        - description: Request data with raw text
          in: body
          name: request
          required: true
          schema:
            $ref: "#/definitions/GenerateRequestInput"
      produces:
        - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: "#/definitions/Request"
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties:
              type: string
            type: object
      security:
        - BearerAuth: []
      summary: generates a request
      tags:
        - requests
  /rooms:
    post:
      consumes:
        - application/json
      description:
        Retrieves rooms with optional floor filters and cursor pagination,
        including any active guest bookings
      parameters:
        - description: Hotel ID (UUID)
          in: header
          name: X-Hotel-ID
          required: true
          type: string
        - description: Filters and pagination
          in: body
          name: body
          schema:
            $ref: "#/definitions/FilterRoomsRequest"
      produces:
        - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: "#/definitions/github_com_generate_selfserve_internal_utils.CursorPage-RoomWithOptionalGuestBooking"
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties:
              type: string
            type: object
      security:
        - BearerAuth: []
      summary: List rooms with filters
      tags:
        - rooms
  /rooms/floors:
    get:
      description: Retrieves all distinct floor numbers
      parameters:
        - description: Hotel ID (UUID)
          in: header
          name: X-Hotel-ID
          required: true
          type: string
      produces:
        - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              type: integer
            type: array
        "500":
          description: Internal Server Error
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Get Floors
      tags:
        - rooms
  /users:
    post:
      consumes:
        - application/json
      description: Creates a user with the given data
      parameters:
        - description: User data
          in: body
          name: request
          required: true
          schema:
            $ref: "#/definitions/CreateUser"
      produces:
        - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: "#/definitions/User"
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Internal Server Error
          schema:
